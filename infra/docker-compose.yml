services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: sad-cnr-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sad_cnr}
      POSTGRES_USER: ${POSTGRES_USER:-sad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sad123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sad} -d ${POSTGRES_DB:-sad_cnr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  import-service:
    build:
      context: ../import-service
      dockerfile: Dockerfile
    container_name: sad-cnr-import
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sad_cnr}
      POSTGRES_USER: ${POSTGRES_USER:-sad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sad123}
      IMPORT_MIN_LAT: "-22.40"
      IMPORT_MAX_LAT: "-22.25"
      IMPORT_MIN_LON: "-49.15"
      IMPORT_MAX_LON: "-49.00"
    ports:
      - "${IMPORT_SERVICE_PORT:-8090}:8090"
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  # Motor OSRM — habilite após processar o .pbf (ver README)
  # osrm:
  #   image: ghcr.io/project-osrm/osrm-backend:latest
  #   container_name: sad-cnr-osrm
